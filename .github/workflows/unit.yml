name: Unit Tests

on:
  pull_request:
    branches:
      - main
  merge_group:

permissions:
  contents: read

jobs:
  vitest-unit:
    name: vitest-unit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit
